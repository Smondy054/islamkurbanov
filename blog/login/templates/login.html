{% extends "base.html" %}
{% block title %}Вход в систему{% endblock title %}
{% block content %}
    <h2>Вход в систему</h2>
    
    {% if error %}
        <div class="error-message" style="color: red; padding: 10px; background-color: #ffe6e6; border: 1px solid red; margin-bottom: 15px;">
            {{ error }}
        </div>
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        <label for="login">Логин пользователя</label>
        <input type="text" name="login" id="login" required>
        <br><br>
        <label for="password">Пароль</label>
        <input type="password" name="pas" id="password" required>
        <br><br>
        <input type="submit" value="Войти">
    </form>
    
    <p>Нет аккаунта? <a href="/add_user/">Зарегистрироваться</a></p>
{% endblock content %}

<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Музыкальный каталог{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}" />
</head>
<body>
    <nav>
        <a href="/">Главная</a>
        
        {% if request.session.user_id %}
            <a href="/add_user/">Добавить пользователя</a>
            <a href="/users/">Все пользователи</a>
            <span>Привет, {{ request.session.user_login }}!</span>
            <a href="/logout/" style="color: #ff6b6b;">Выйти</a>
        {% else %}
            <a href="/login/">Войти</a>
            <a href="/add_user/">Регистрация</a>
        {% endif %}
    </nav>
    
    {% block content %} {% endblock content %}
</body>
</html>
